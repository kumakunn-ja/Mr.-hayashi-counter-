<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林田先生 チョーククラッシュカウンター</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #2e5a44; /* 黒板っぽい緑 */
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.2);
            padding: 30px;
            border-radius: 15px;
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .subtitle {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 30px;
        }
        .counter {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 3px 3px 0px #1e3d2f;
        }
        .status-badge {
            display: inline-block;
            background-color: #4a90e2;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .btn-crash {
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            transition: all 0.2s;
            margin: 10px;
            background-color: #ff4757;
            color: white;
            box-shadow: 0 5px 0 #cf2131;
        }
        .btn-crash:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        .info-text {
            font-size: 12px;
            color: #ccc;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>林田先生チョーククラッシュカウンター</h1>
    <div class="subtitle">〜ああっ、また先生がチョークを……〜</div>
    
    <div class="status-badge">JSON自動同期中</div>

    <!-- カウンター表示 -->
    <div class="counter" id="countDisplay">-</div>
    
    <!-- カウントボタン -->
    <button class="btn-crash" onclick="countUp()">クラッシュ！</button>

    <div class="info-text">
        ※ボタンを押すと最新のカウントを含んだJSONファイルがダウンロードされます。<br>
        フォルダ内の「counter.json」をそのファイルに上書きしてください。
    </div>
</div>

<script>
    const JSON_FILE_PATH = 'counter.json'; // 読み込むJSONファイル名
    let chalkData = { teacher: "林田先生", crashCount: 0 };

    // 1. ページを開いた瞬間にJSONを自動で読み込む
    window.addEventListener('DOMContentLoaded', () => {
        fetch(JSON_FILE_PATH)
            .then(response => {
                if (!response.ok) {
                    throw new Error('JSONファイルが見つかりません。初期値で開始します。');
                }
                return response.json();
            })
            .then(data => {
                chalkData = data;
                updateDisplay();
            })
            .catch(error => {
                console.error(error);
                alert('counter.json が読み込めませんでした。同じフォルダにファイルがあるか確認してください。');
                updateDisplay();
            });
    });

    // 画面の数値を更新する関数
    function updateDisplay() {
        document.getElementById('countDisplay').textContent = chalkData.crashCount;
    }

    // カウントアップ＆新しいJSONのダウンロード
    function countUp() {
        chalkData.crashCount++;
        updateDisplay();
        
        // ローカル環境のセキュリティ上、ブラウザから直接ファイルを書き換えることはできないため、
        // 更新された新しいJSONファイルを自動でダウンロードさせます。
        downloadJSON();
    }

    // JSONファイルをダウンロードする関数
    function downloadJSON() {
        const jsonString = JSON.stringify(chalkData, null, 2);
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = 'counter.json'; // 同じ名前でダウンロード
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
